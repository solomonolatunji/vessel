host: localhost:8080
info:
  contact: {}
  description: Vessl API Documentation
  title: Vessl API
  version: "1.0"
paths:
  /apps/{id}:
    delete:
      consumes:
      - application/json
      description: Delete App Service
      parameters:
      - description: App ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses: {}
      summary: Delete App Service
      tags:
      - AppServices
    get:
      consumes:
      - application/json
      description: Get App Service
      parameters:
      - description: App ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses: {}
      summary: Get App Service
      tags:
      - AppServices
    put:
      consumes:
      - application/json
      description: Update App Service
      parameters:
      - description: App ID
        in: path
        name: id
        required: true
        type: string
      - description: Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AppService'
      produces:
      - application/json
      responses: {}
      summary: Update App Service
      tags:
      - AppServices
  /apps/{id}/redeploy:
    post:
      consumes:
      - application/json
      description: Creates a new deployment for this app service using the same branch/commit
        as the last deployment
      parameters:
      - description: App ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses: {}
      summary: Redeploy App Service
      tags:
      - AppServices
  /apps/{id}/restart:
    post:
      consumes:
      - application/json
      description: Restarts all containers belonging to this app service
      parameters:
      - description: App ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses: {}
      summary: Restart App Service
      tags:
      - AppServices
  /apps/{id}/stop:
    post:
      consumes:
      - application/json
      description: Stops all containers belonging to this app service
      parameters:
      - description: App ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses: {}
      summary: Stop App Service
      tags:
      - AppServices
  /audit-logs:
    get:
      consumes:
      - application/json
      description: Fetches audit logs for the dashboard
      parameters:
      - description: Max lines to fetch
        in: query
        name: limit
        type: integer
      - description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses: {}
      summary: List Audit Logs
      tags:
      - Audit
  /auth/2fa/disable:
    post:
      consumes:
      - application/json
      description: Disable2FA endpoint
      produces:
      - application/json
      responses: {}
      summary: Disable2FA endpoint
      tags:
      - Auth
  /auth/2fa/setup:
