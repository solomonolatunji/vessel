  /system/export:
    post:
      consumes:
      - application/json
      description: Exports the full server state (SQLite database + all DB container
        dumps) into an AES-256-GCM encrypted .vessl bundle. Admin only.
      parameters:
      - description: JSON with passphrase
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/octet-stream
      responses:
        "200":
          description: Encrypted .vessl bundle file
          schema:
            type: file
        "400":
          description: Missing passphrase
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Export failed
          schema:
            additionalProperties: true
            type: object
      summary: Export server bundle
      tags:
      - System
  /system/import:
    post:
      consumes:
      - multipart/form-data
      description: Imports an encrypted .vessl bundle, restoring the SQLite database
        and all DB container data. Admin only. Triggers a server restart after restore.
      parameters:
      - description: Passphrase used to decrypt the bundle
        in: formData
        name: passphrase
        required: true
        type: string
      - description: The .vessl bundle file to import
        in: formData
        name: bundle
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Import completed with manifest details
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing passphrase or bundle file
          schema:
            additionalProperties: true
            type: object
        "422":
          description: Decryption or restore failed
          schema:
            additionalProperties: true
            type: object
      summary: Import server bundle
      tags:
      - System
