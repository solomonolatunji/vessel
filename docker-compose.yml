services:
  codedock:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/buildwithtechx/codedock:${CODEDOCK_VERSION:-latest}
    container_name: codedock-control-plane
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "80:80"
      - "443:443"
    env_file:
      - .env
    environment:
      - PORT=8080
      - CODEDOCK_DATA_DIR=/codedock/data
      - CODEDOCK_DASHBOARD_URL=${CODEDOCK_DASHBOARD_URL:-http://localhost:8080}
      - TZ=${CODEDOCK_TIMEZONE:-UTC}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${CODEDOCK_DOMAIN:-codedock.local}`)"
      - "traefik.http.routers.dashboard.tls=${CODEDOCK_DOMAIN:+true}"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"
    volumes:
      - codedock_data:/codedock/data
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro
    networks:
      - codedock-network

volumes:
  codedock_data:
    name: codedock_data

networks:
  codedock-network:
    name: codedock-network
    driver: bridge
