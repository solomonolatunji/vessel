services:
  vessel:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/vesslhq/vessl:${VESSEL_VERSION:-latest}
    container_name: vessel-control-plane
    restart: unless-stopped
    ports:
      - "8080:8080" # API and Dashboard GUI
      - "80:80" # Automatic reverse proxy HTTP
      - "443:443" # Automatic reverse proxy HTTPS / TLS
    env_file:
      - .env
    environment:
      - PORT=8080
      - VESSEL_DATA_DIR=/var/www/vessel/data
      - VESSEL_STATIC_DIR=/var/www/vessel/dashboard/dist
      - VESSEL_TLS_EMAIL=${VESSEL_TLS_EMAIL:-admin@vessel.local}
    volumes:
      - vessel_data:/var/www/vessel/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vessel-network

volumes:
  vessel_data:
    name: vessel_data

networks:
  vessel-network:
    name: vessel-network
    driver: bridge
