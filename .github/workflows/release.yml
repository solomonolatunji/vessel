name: Release

on:
  push:
    tags:
      - "v*" # Trigger on tags like v1.0.0, v0.2.1, etc.

permissions:
  contents: write # Needed to create GitHub Releases

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install dependencies & build dashboard
        run: |
          npm ci
          npm --workspace=apps/dashboard run generate-routes
          npm --workspace=apps/dashboard run build
        # We must build the dashboard first because Go uses //go:embed to bundle the React app inside the binary.

      - name: Build and Package Binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist

          # ---------------------------------------------------------
          # 1. Build the server daemon (codedockd)
          # Server only runs on Linux, so we only build for Linux
          # ---------------------------------------------------------
          for GOARCH in amd64 arm64; do
            echo "Building codedockd for linux/$GOARCH..."
            GOOS=linux GOARCH=$GOARCH go build -ldflags="-s -w -X main.codedockVersion=$VERSION" -o dist/codedockd_linux_$GOARCH ./cmd/codedockd

            # Compress
            tar -czf dist/codedockd_linux_$GOARCH.tar.gz -C dist codedockd_linux_$GOARCH
            rm dist/codedockd_linux_$GOARCH
          done

          # ---------------------------------------------------------
          # 2. Build the remote client CLI (codedock)
          # Client runs on laptops, so we build for Mac, Linux, Windows
          # ---------------------------------------------------------
          # macOS
          for GOARCH in amd64 arm64; do
            echo "Building codedock for darwin/$GOARCH..."
            GOOS=darwin GOARCH=$GOARCH go build -ldflags="-s -w -X main.version=$VERSION" -o dist/codedock ./cmd/codedock
            tar -czf dist/codedock_darwin_$GOARCH.tar.gz -C dist codedock
            rm dist/codedock
          done

          # Linux
          for GOARCH in amd64 arm64; do
            echo "Building codedock for linux/$GOARCH..."
            GOOS=linux GOARCH=$GOARCH go build -ldflags="-s -w -X main.version=$VERSION" -o dist/codedock ./cmd/codedock
            tar -czf dist/codedock_linux_$GOARCH.tar.gz -C dist codedock
            rm dist/codedock
          done

          # Windows
          for GOARCH in amd64 arm64; do
            echo "Building codedock for windows/$GOARCH..."
            GOOS=windows GOARCH=$GOARCH go build -ldflags="-s -w -X main.version=$VERSION" -o dist/codedock.exe ./cmd/codedock
            zip -j dist/codedock_windows_$GOARCH.zip dist/codedock.exe
            rm dist/codedock.exe
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
