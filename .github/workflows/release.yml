name: Release

on:
  push:
    tags:
      - "v*" # Trigger on tags like v1.0.0, v0.2.1, etc.

permissions:
  contents: write # Needed to create GitHub Releases

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install dependencies & build dashboard
        run: |
          npm ci
          npm --workspace=dashboard run generate-routes
          npm --workspace=dashboard run build
        # We must build the dashboard first because Go uses //go:embed to bundle the React app inside the binary.

      - name: Build and Package Binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist

          # ---------------------------------------------------------
          # 1. Build the server daemon (vessld)
          # Server only runs on Linux, so we only build for Linux
          # ---------------------------------------------------------
          for GOARCH in amd64 arm64; do
            echo "Building vessld for linux/$GOARCH..."
            GOOS=linux GOARCH=$GOARCH go build -ldflags="-s -w -X main.vesslVersion=$VERSION" -o dist/vessld_linux_$GOARCH ./cmd/vessld

            # Compress
            tar -czf dist/vessld_linux_$GOARCH.tar.gz -C dist vessld_linux_$GOARCH
            rm dist/vessld_linux_$GOARCH
          done

          # ---------------------------------------------------------
          # 2. Build the remote client CLI (vessl)
          # Client runs on laptops, so we build for Mac, Linux, Windows
          # ---------------------------------------------------------
          # macOS
          for GOARCH in amd64 arm64; do
            echo "Building vessl for darwin/$GOARCH..."
            GOOS=darwin GOARCH=$GOARCH go build -ldflags="-s -w -X main.version=$VERSION" -o dist/vessl ./cmd/vessl
            tar -czf dist/vessl_darwin_$GOARCH.tar.gz -C dist vessl
            rm dist/vessl
          done

          # Linux
          for GOARCH in amd64 arm64; do
            echo "Building vessl for linux/$GOARCH..."
            GOOS=linux GOARCH=$GOARCH go build -ldflags="-s -w -X main.version=$VERSION" -o dist/vessl ./cmd/vessl
            tar -czf dist/vessl_linux_$GOARCH.tar.gz -C dist vessl
            rm dist/vessl
          done

          # Windows
          for GOARCH in amd64 arm64; do
            echo "Building vessl for windows/$GOARCH..."
            GOOS=windows GOARCH=$GOARCH go build -ldflags="-s -w -X main.version=$VERSION" -o dist/vessl.exe ./cmd/vessl
            zip -j dist/vessl_windows_$GOARCH.zip dist/vessl.exe
            rm dist/vessl.exe
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
