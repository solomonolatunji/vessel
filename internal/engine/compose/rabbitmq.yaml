version: "3.8"
services:
  rabbitmq:
    image: rabbitmq:4-alpine
    x-codedock:
      is_database: true
      connection_string: "amqp://${host}:${port}"
    ports:
      - "5672:5672"
    environment:
      - RABBITMQ_DEFAULT_USER=${db.username}
      - RABBITMQ_DEFAULT_PASS=${db.password}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
