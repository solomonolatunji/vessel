services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vesseladmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - ${PORT:-5432}:5432
    restart: unless-stopped
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-vesseladmin}
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
