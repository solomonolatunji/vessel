version: "3.8"
services:
  keydb:
    image: eqalpha/keydb:latest
    x-vessel:
      is_database: true
      connection_string: "redis://:${db.password}@${host}:${port}/0"
      backup:
        command: ["keydb-cli", "SAVE"]
        file_extension: ".rdb"
    command:
      - keydb-server
      - --requirepass
      - ${db.password}
      - --appendonly
      - "yes"
    volumes:
      - keydb-data:/data
